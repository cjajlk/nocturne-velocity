<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nocturne Velocity</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <div id="hud">
    <div id="scoreHud"><span class="hudLabel">Score</span><br><span id="scoreCount">0</span></div>
    <div id="levelHud" class="hud-title">Niveau<br><span id="levelCount">1</span></div>
    <div id="creditsHud"><span class="hudLabel">Crédits</span><br><span id="creditCount">0</span></div>
  </div>
  <div id="moduleHUD" class="module-hud">
    <span id="moduleIcon">⚡</span>
    <span id="moduleName">FLUX</span>
  </div>
  <div id="intensityHUD" class="intensity-hud">INTENSITÉ x1.0</div>
  <div class="energy-bar">
    <div id="energyFill" class="energy-fill"></div>
  </div>
  <canvas id="gameCanvas"></canvas>
  <button id="shootBtn" class="shoot-btn">🔫</button>
  <script src="gameplay.js"></script>
  <style>
  html, body, #gameCanvas {
    touch-action: none;
  }

  body {
    overscroll-behavior: none;
  }

  :root {
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

.shoot-btn{
    position: absolute;
  bottom: calc(18px + var(--safe-bottom));
  right: clamp(16px, 2.4vw, 30px);
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    color: white;
    font-size: 24px;
    z-index: 10;
    border: none;
    outline: none;
    box-shadow: 0 0 10px #00fff7;
    display: none; /* Par défaut caché, à afficher selon le mode */
    touch-action: manipulation;
}
.module-hud {
  position: fixed;
  bottom: calc(20px + var(--safe-bottom));
  left: clamp(118px, 8.5vw, 156px);
  transform: none;

  display: flex;
  align-items: center;
  gap: 10px;

  padding: 10px 18px;
  min-width: 186px;
  border-radius: 14px;

  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(6px);

  font-weight: bold;
  letter-spacing: 1px;
  z-index: 101;
  pointer-events: none;
  opacity: 0.85;
  transition: opacity 0.2s ease;

  animation: glowPulse 3s infinite ease-in-out;
}

.module-hud.flux {
  color: #00eaff;
  box-shadow: 0 0 20px rgba(0, 234, 255, 0.6);
}

.module-hud.impact {
  color: #ff4cff;
  box-shadow: 0 0 20px rgba(255, 76, 255, 0.6);
}

.module-hud.resonance {
  color: #b84cff;
  box-shadow: 0 0 22px rgba(184, 76, 255, 0.75);
}

@keyframes glowPulse {
  0% { box-shadow: 0 0 15px rgba(0,255,255,0.4); }
  50% { box-shadow: 0 0 30px rgba(0,255,255,0.8); }
  100% { box-shadow: 0 0 15px rgba(0,255,255,0.4); }
}

.module-hud.flash {
  animation: flashAnim 0.4s ease;
}

.intensity-hud {
  position: fixed;
  top: 58px;
  right: 24px;
  padding: 8px 14px;
  border-radius: 10px;
  background: rgba(0, 0, 0, 0.5);
  color: #00eaff;
  font-weight: bold;
  letter-spacing: 1px;
  box-shadow: 0 0 12px rgba(0, 234, 255, 0.35);
  z-index: 101;
  pointer-events: none;
}

.energy-bar {
  position: fixed;
  bottom: calc(76px + var(--safe-bottom));
  left: clamp(118px, 8.5vw, 156px);

  width: clamp(170px, 19vw, 250px);
  height: 10px;

  background: rgba(0,0,0,0.6);
  border-radius: 6px;
  overflow: hidden;

  box-shadow: 0 0 10px rgba(0,255,255,0.3);
  z-index: 101;
}

.energy-fill {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg, #00eaff, #00ff88);
  transition: width 0.1s linear;
}

@keyframes flashAnim {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

@media (min-width: 761px) {
  .module-hud {
    justify-content: flex-start;
  }
}

@media (min-width: 1400px) {
  .module-hud {
    left: 50%;
    transform: translateX(-50%);
    min-width: 240px;
    justify-content: center;
  }

  .energy-bar {
    left: 50%;
    transform: translateX(-50%);
    width: min(300px, 28vw);
  }
}

@media (max-width: 760px) {
  .module-hud {
    left: 50%;
    transform: translateX(-50%);
    bottom: calc(10px + var(--safe-bottom));
    padding: 8px 14px;
    gap: 8px;
    font-size: 0.95rem;
    max-width: 74vw;
    justify-content: center;
  }

  .energy-bar {
    left: 50%;
    transform: translateX(-50%);
    bottom: calc(56px + var(--safe-bottom));
    width: min(68vw, 230px);
    height: 9px;
  }

  .shoot-btn {
    right: 14px;
    width: 62px;
    height: 62px;
    font-size: 22px;
  }
}

@media (max-width: 420px) {
  .module-hud {
    font-size: 0.86rem;
    max-width: 82vw;
    padding: 7px 12px;
  }

  .energy-bar {
    width: min(74vw, 210px);
  }
}
  </style>
</body>
</html>
